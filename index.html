<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quick Access</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:url("https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiyGkAbhdD4EPvNEwVkExJGI3t1HidcKhb1vJ3k_813Y-Bo1J6k80nrkFZqmSjYqoju16r5LhMK5U1qIgf_5ObHWICre-z0VB15o_UjsEET6p8icMiDeiDrYx5aw-Cl_25mhcK1DZQkMr2x2yxWvKsyyUVcP_1lHVD8cgUQhcX6Xvl-G_VVJUbn_7Qo2-k/s931/a40a99017386a4618e77eff5d54c790c.jpg") center/cover no-repeat;
position:relative;
padding:20px;
}

.overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.35);
backdrop-filter:blur(3px);
}

.container{
position:relative;
text-align:center;
color:white;
z-index:2;
max-width:400px;
width:100%;
}

h1{
font-size:26px;
margin-bottom:10px;
}

p{
font-size:16px;
margin-bottom:25px;
opacity:0.9;
}

.buttons{
display:flex;
flex-direction:column;
gap:12px;
align-items:center;
}

button{
padding:15px;
font-size:16px;
border:none;
border-radius:8px;
cursor:pointer;
transition:0.3s;
width:100%;
max-width:250px;
}

.btn1{
background:#ffffff;
color:#000;
}

.btn2{
background:#25D366;
color:white;
animation:pulse 2.5s infinite;
}

button:hover{
transform:scale(1.05);
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.05);}
100%{transform:scale(1);}
}

/* Mobile adjustment */

@media(max-width:600px){

h1{
font-size:22px;
}

p{
font-size:15px;
}

button{
font-size:15px;
padding:14px;
}

}

</style>
<link rel="me" href="https://www.blogger.com/profile/04209175009256562906" />
<meta name='google-adsense-platform-account' content='ca-host-pub-1556223355139109'/>
<meta name='google-adsense-platform-domain' content='blogspot.com'/>
</head>

<body>

<div class="overlay"></div>

<div class="container">

<h1>Parabéns! Está a apenas um passo de distância!</h1>
<p>Por favor, selecione a sua faixa etária para continuar.</p>

<div class="buttons">
<button class="btn1" onclick="goLink()">Tenho menos de 15 anos.</button>
<button class="btn2" onclick="goLink()">Tenho mais de 15 anos</button>
</div>

</div>

<script>

function goLink(){
window.location.href="https://ln.run/wtch";
}

</script>

</body>
</html>
