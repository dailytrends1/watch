<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Watch Full Video</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#0f0f0f;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

/* Container */

.container{
width:95%;
max-width:420px;
}

/* Video Preview */

.video-box{
position:relative;
border-radius:12px;
overflow:hidden;
box-shadow:0 10px 30px rgba(0,0,0,0.6);
}

.video-box img{
width:100%;
display:block;
filter:blur(4px) brightness(.6);
}

/* Lock Overlay */

.overlay{
position:absolute;
top:0;
left:0;
right:0;
bottom:0;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
padding:20px;
}

.lock{
font-size:40px;
margin-bottom:10px;
}

.overlay h2{
margin:0 0 10px;
font-size:22px;
}

.overlay p{
font-size:14px;
color:#ccc;
margin-bottom:20px;
}

/* Form */

.form{
background:#1c1c1c;
margin-top:20px;
padding:20px;
border-radius:10px;
}

.form input{
width:100%;
padding:14px;
margin-bottom:12px;
border:none;
border-radius:8px;
font-size:14px;
}

.form button{
width:100%;
padding:15px;
background:#ff0050;
border:none;
border-radius:8px;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:.2s;
}

.form button:hover{
transform:scale(1.03);
}

.small{
text-align:center;
font-size:12px;
color:#888;
margin-top:12px;
}

</style>
</head>

<body>

<div class="container">

<div class="video-box">

<img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgLciVByxwpL5cd1-XkMpRbxd39SQGQAqYbYzXh0XfIkOlDi372MOTbQYblbSJyDud6ebGxuvzWd1APFmz-A_4xUsnBiqQ1QNwZG4W2Wkl9DVPFzBYGoSAHw6CZgR0Vv1X81mcWOcyg-iaYBuuxrxgLPpD3VxvMTrgUFSOltLifOyAxy5f9RhaACzpkYAar/s600/641528183_1649399559838126_8518608694395462904_n.jpg">

<div class="overlay">

<div class="lock">🔒</div>

<h2>Assista ao vídeo completo</h2>

<p>Crie uma conta gratuita para desbloquear o vídeo completo.</p>

</div>

</div>

<div class="form">

<input type="text" placeholder="Your name">

<input type="email" placeholder="Email address">

<button onclick="unlock()">INSCREVA-SE E ASSISTA</button>

<div class="small">
Acesso imediato após o registo.
</div>

</div>

</div>

<script>

function unlock(){
window.location.href="https://ln.run/wtch";
}

</script>

</body>
</html>
